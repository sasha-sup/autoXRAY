name: Upstream Sync PR

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/xVRVx/autoXRAY.git
          git fetch upstream main

      - name: Check if behind upstream
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Commits behind upstream: $BEHIND"

      - name: Skip if open sync PR already exists
        if: steps.check.outputs.behind != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --state open --search "Sync from upstream in:title" --json number --jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Open sync PR already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and try merge
        if: steps.check.outputs.behind != '0' && steps.existing.outputs.exists == 'false'
        id: merge
        run: |
          BRANCH="upstream-sync-$(date -u +%Y%m%d-%H%M)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"
          if git merge upstream/main --no-edit -m "Merge upstream xVRVx/autoXRAY main"; then
            echo "result=clean" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch and open PR (clean merge)
        if: steps.merge.outputs.result == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ steps.merge.outputs.branch }}"
          gh pr create \
            --base main \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "Sync from upstream xVRVx/autoXRAY ($(date -u +%Y-%m-%d))" \
            --body "$(printf 'Auto-sync from upstream `xVRVx/autoXRAY` main.\n\nMerge was clean — %s commits pulled in. Review the diff and merge with **Create a merge commit** to preserve history on both sides.\n' "${{ steps.check.outputs.behind }}")"

      - name: Open issue (merge has conflicts)
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --state open --search "Manual upstream sync needed in:title" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Conflict issue already open, skipping."
            exit 0
          fi
          gh issue create \
            --title "Manual upstream sync needed (conflicts $(date -u +%Y-%m-%d))" \
            --body "$(printf 'Auto-merge from upstream `xVRVx/autoXRAY` had conflicts (%s commits behind). Resolve manually:\n\n```bash\ngit fetch upstream\ngit checkout main\ngit merge upstream/main\n# resolve conflicts in editor, then:\ngit add -A\ngit commit\ngit push origin main\n```\n' "${{ steps.check.outputs.behind }}")"
